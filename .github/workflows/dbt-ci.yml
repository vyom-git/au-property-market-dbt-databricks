

name: dbt CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  dbt-parse:
    name: dbt parse
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install dbt packages
        run: dbt deps

      - name: Create dummy dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<'EOF'
          au_property_market:
            target: ci
            outputs:
              ci:
                type: databricks
                catalog: workspace
                schema: property_analytics_ci
                host: dummy.cloud.databricks.com
                http_path: /sql/1.0/warehouses/dummy
                token: dummy_token
                threads: 4
          EOF

      - name: Parse dbt project
        run: dbt parse
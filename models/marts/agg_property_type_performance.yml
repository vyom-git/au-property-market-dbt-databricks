version: 2

models:
  - name: agg_property_type_performance
    description: Aggregated property sales performance by property purpose group.

    columns:
      - name: property_purpose_group
        description: Simplified property category used for analytics.
        tests:
          - not_null

      - name: sale_count
        description: Number of sales in the property purpose group.
        tests:
          - not_null

      - name: avg_purchase_price
        description: Average purchase price for the property purpose group.

      - name: median_purchase_price
        description: Median purchase price for the property purpose group, calculated using approximate percentile.

      - name: min_purchase_price
        description: Minimum purchase price for the property purpose group.

      - name: max_purchase_price
        description: Maximum purchase price for the property purpose group.